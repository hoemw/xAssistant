[/Script/SmartUEAssistant.SmartUEAssistantSettings]
; AI API端点配置
APIEndpoint="https://api.openai.com/v1/chat/completions"

; API密钥（请在此处填写您的API密钥）
APIKey=

; 支持的AI模型
SupportedModels=deepseek-chat

; 请求超时时间（秒）
RequestTimeout=150

; 最大令牌数
MaxTokens=4000

; 温度参数（控制生成随机性）
Temperature=0.7
BaseURL="https://api.deepseek.com/v1"
MaxConversationRounds=20
bSkipConfirmForConsoleCommands=True

